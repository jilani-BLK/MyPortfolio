<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PyMath вҖ” dГ©mo</title>
<style>
  :root {
    --bg: #0b0b0c; --card: #141417; --txt: #f5f5f7; --muted: #9aa0a6;
    --btn: #1f1f24; --btn-h: #2a2a31; --accent: #3b82f6; --accent-h: #2f6fe0;
    --op: #26262d; --op-h: #32323b; --warn: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: transparent; color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .calc { width: 100%; max-width: 340px; background: var(--card); border-radius: 18px;
    padding: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.4); }
  .screen { text-align: right; padding: 10px 8px 14px; }
  .expr { color: var(--muted); font-size: 14px; min-height: 18px; word-break: break-all; }
  .out { font-size: 40px; font-weight: 600; word-break: break-all; line-height: 1.1; }
  .mem { color: var(--accent); font-size: 12px; min-height: 14px; text-align: left; padding: 0 8px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
  button { border: 0; border-radius: 12px; padding: 16px 0; font-size: 18px; cursor: pointer;
    background: var(--btn); color: var(--txt); transition: background .15s; user-select: none; }
  button:hover { background: var(--btn-h); }
  .op { background: var(--op); } .op:hover { background: var(--op-h); }
  .fn { background: var(--op); color: var(--muted); font-size: 16px; } .fn:hover { background: var(--op-h); }
  .eq { background: var(--accent); } .eq:hover { background: var(--accent-h); }
  .history { margin-top: 12px; border-top: 1px solid #26262d; padding-top: 8px; height: 84px;
    overflow-y: auto; font-size: 13px; color: var(--muted); }
  .history:empty::before { content: "Historique"; opacity: .5; padding: 2px 4px; }
  .history div { padding: 2px 4px; }
  .history div:hover { color: var(--txt); }
</style>
</head>
<body>
  <div class="calc">
    <div class="mem" id="mem"></div>
    <div class="screen">
      <div class="expr" id="expr"></div>
      <div class="out" id="out">0</div>
    </div>
    <div class="grid">
      <button class="fn" data-act="mc">MC</button>
      <button class="fn" data-act="mr">MR</button>
      <button class="fn" data-act="m+">M+</button>
      <button class="fn" data-act="m-">MвҲ’</button>

      <button class="fn" data-act="clear">C</button>
      <button class="fn" data-act="neg">Вұ</button>
      <button class="fn" data-act="sqrt">вҲҡ</button>
      <button class="op" data-op="/">Г·</button>

      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
      <button class="op" data-op="*">Г—</button>

      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button class="op" data-op="-">вҲ’</button>

      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button class="op" data-op="+">+</button>

      <button class="fn" data-act="pct">%</button>
      <button data-num="0">0</button>
      <button data-num=".">.</button>
      <button class="eq" data-act="eq">=</button>
    </div>
    <div class="history" id="history"></div>
  </div>

<script>
(function () {
  const outEl = document.getElementById('out');
  const exprEl = document.getElementById('expr');
  const memEl = document.getElementById('mem');
  const histEl = document.getElementById('history');

  let cur = '0', prev = null, op = null, fresh = true, mem = 0, hist = [];

  const fmt = n => {
    if (!isFinite(n)) return 'Erreur';
    const r = Math.round((n + Number.EPSILON) * 1e10) / 1e10;
    return String(r);
  };
  const render = () => {
    outEl.textContent = cur;
    exprEl.textContent = (prev !== null && op) ? `${prev} ${({'+':'+','-':'вҲ’','*':'Г—','/':'Г·'})[op]}` : '';
    memEl.textContent = mem !== 0 ? `M = ${fmt(mem)}` : '';
  };
  const pushHist = line => { hist.unshift(line); hist = hist.slice(0, 20);
    histEl.innerHTML = hist.map(h => `<div>${h}</div>`).join(''); };

  const compute = (a, b, o) => {
    a = parseFloat(a); b = parseFloat(b);
    switch (o) { case '+': return a + b; case '-': return a - b;
      case '*': return a * b; case '/': return b === 0 ? Infinity : a / b; }
  };

  const inputNum = n => {
    if (cur === 'Erreur') cur = '0';
    if (fresh) { cur = (n === '.') ? '0.' : n; fresh = false; }
    else if (n === '.') { if (!cur.includes('.')) cur += '.'; }
    else { cur = (cur === '0') ? n : cur + n; }
    render();
  };
  const setOp = o => {
    if (cur === 'Erreur') return;
    if (op && !fresh) { const r = compute(prev, cur, op); prev = fmt(r); cur = prev; }
    else { prev = cur; }
    op = o; fresh = true; render();
  };
  const equals = () => {
    if (op === null || prev === null) return;
    const r = compute(prev, cur, op);
    const sym = ({'+':'+','-':'вҲ’','*':'Г—','/':'Г·'})[op];
    pushHist(`${prev} ${sym} ${cur} = ${fmt(r)}`);
    cur = fmt(r); prev = null; op = null; fresh = true; render();
  };
  const act = a => {
    if (a === 'clear') { cur = '0'; prev = null; op = null; fresh = true; }
    else if (a === 'neg') { if (cur !== 'Erreur') cur = fmt(parseFloat(cur) * -1); }
    else if (a === 'sqrt') { const v = parseFloat(cur); cur = v < 0 ? 'Erreur' : fmt(Math.sqrt(v)); pushHist(`вҲҡ${v} = ${cur}`); fresh = true; }
    else if (a === 'pct') { cur = fmt(parseFloat(cur) / 100); fresh = true; }
    else if (a === 'eq') return equals();
    else if (a === 'mc') mem = 0;
    else if (a === 'mr') { cur = fmt(mem); fresh = true; }
    else if (a === 'm+') mem += parseFloat(cur) || 0;
    else if (a === 'm-') mem -= parseFloat(cur) || 0;
    render();
  };

  document.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    if (b.dataset.num !== undefined) inputNum(b.dataset.num);
    else if (b.dataset.op !== undefined) setOp(b.dataset.op);
    else if (b.dataset.act !== undefined) act(b.dataset.act);
  }));

  window.addEventListener('keydown', e => {
    const k = e.key;
    if (/[0-9]/.test(k)) inputNum(k);
    else if (k === '.') inputNum('.');
    else if (['+','-','*','/'].includes(k)) setOp(k);
    else if (k === 'Enter' || k === '=') { e.preventDefault(); equals(); }
    else if (k === 'Escape') act('clear');
    else if (k === '%') act('pct');
    else if (k === 'Backspace') { cur = cur.length > 1 ? cur.slice(0, -1) : '0'; render(); }
  });

  render();
})();
</script>
</body>
</html>
